<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Química — Tabela Periódica + Mapa Mental</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   ROOT & RESET
═══════════════════════════════════════════════════════════ */
:root {
  --bg:       #07090e;
  --surface:  #0d1018;
  --surface2: #131720;
  --border:   rgba(255,255,255,0.07);
  --gold:     #c9a84c;
  --gold-l:   #f0d080;
  --text:     #cfc8bc;
  --muted:    rgba(207,200,188,0.42);

  /* element category colors */
  --alkali:    #e05a4e;
  --alkearth:  #e07a3a;
  --tmetal:    #4a9eca;
  --ptmetal:   #8b7fd4;
  --metalloid: #6ab187;
  --nonmetal:  #4db8a8;
  --halogen:   #d46b8a;
  --noble:     #c9a84c;
  --lanthanide:#9b6fc4;
  --actinide:  #c45a7a;

  /* mind-map branch colors */
  --c1:#e07b54; --c2:#4db8a8; --c3:#9b7fd4;
  --c4:#e8b84b; --c5:#6ab187; --c6:#d46b8a;

  --pt-w: 430px;   /* periodic table sidebar width (increased ~30%) */
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'JetBrains Mono',monospace;color:var(--text);}

/* ═══════════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════════ */
#app { display:flex; width:100%; height:100%; }

/* ── LEFT: Periodic Table Panel ── */
#pt-panel {
  width: var(--pt-w);
  min-width: var(--pt-w);
  height: 100%;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 10;
  position: relative;
}

#pt-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#pt-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 700;
  color: var(--gold-l); letter-spacing: .06em;
}
#pt-header p { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing:.08em; }

/* legend */
#pt-legend {
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 4px 8px;
  flex-shrink: 0;
}
.leg-item { display:flex; align-items:center; gap:4px; font-size:9px; color:var(--muted); }
.leg-dot  { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

/* grid wrapper */
#pt-grid-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 6px 10px;
}
#pt-grid-wrap::-webkit-scrollbar{ width:3px; }
#pt-grid-wrap::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.1); border-radius:3px; }

/* The actual CSS grid – 18 columns */
#pt-grid {
  display: grid;
  grid-template-columns: repeat(18, 1fr);
  gap: 3px;
}

.el {
  aspect-ratio: 1;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,.06);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  position: relative;
  transition: transform .15s, box-shadow .15s, border-color .15s;
  overflow: visible;
}
.el:hover {
  transform: scale(1.35);
  z-index: 20;
  border-color: rgba(255,255,255,.35);
  box-shadow: 0 4px 18px rgba(0,0,0,.7);
}
.el .el-z  { font-size: 6.5px; color: rgba(255,255,255,.45); line-height:1; margin-bottom:1px; }
.el .el-sym{ font-size: 12px; font-weight: 700; font-family:'Cormorant Garamond',serif; color:#fff; line-height:1; }
.el .el-m  { font-size: 6px; color: rgba(255,255,255,.4); line-height:1; margin-top:1px; }

/* category colours */
.cat-alkali    { background: rgba(224,90,78,.25);  }
.cat-alkearth  { background: rgba(224,122,58,.25); }
.cat-tmetal    { background: rgba(74,158,202,.18); }
.cat-ptmetal   { background: rgba(139,127,212,.22);}
.cat-metalloid { background: rgba(106,177,135,.22);}
.cat-nonmetal  { background: rgba(77,184,168,.22); }
.cat-halogen   { background: rgba(212,107,138,.25);}
.cat-noble     { background: rgba(201,168,76,.2);  }
.cat-lanthanide{ background: rgba(155,111,196,.22);}
.cat-actinide  { background: rgba(196,90,122,.22); }
.cat-empty     { background: transparent; border-color:transparent; cursor:default; }

/* lanthanide / actinide row gap label */
.la-gap {
  grid-column: 3 / 4;
  background: rgba(155,111,196,.15);
  border: 1px dashed rgba(155,111,196,.3);
  border-radius: 3px;
  display:flex; align-items:center; justify-content:center;
  font-size: 8px; color: rgba(155,111,196,.7);
  cursor:default;
}
.ac-gap {
  grid-column: 3 / 4;
  background: rgba(196,90,122,.15);
  border: 1px dashed rgba(196,90,122,.3);
  border-radius: 3px;
  display:flex; align-items:center; justify-content:center;
  font-size: 8px; color: rgba(196,90,122,.7);
  cursor:default;
}

/* ── Element tooltip ── */
#el-tooltip {
  position: fixed;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,.13);
  border-radius: 10px;
  padding: 14px 16px;
  min-width: 200px; max-width: 240px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .18s;
  z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,.7);
}
#el-tooltip.show { opacity: 1; }
#el-tooltip .tt-sym {
  font-family:'Cormorant Garamond',serif;
  font-size: 38px; font-weight: 700; color: var(--gold-l);
  line-height:1;
}
#el-tooltip .tt-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-top: 2px; font-family:'Cormorant Garamond',serif;
}
#el-tooltip .tt-cat {
  font-size: 8.5px; text-transform:uppercase; letter-spacing:.1em;
  margin-top: 3px; color: var(--muted);
}
#el-tooltip hr { border:none; border-top:1px solid var(--border); margin: 10px 0; }
#el-tooltip table { width:100%; border-collapse:collapse; }
#el-tooltip td { font-size:10px; padding:2px 0; color:var(--text); }
#el-tooltip td:first-child { color:var(--muted); width:55%; }
#el-tooltip .tt-desc {
  font-size:10px; line-height:1.65; color:var(--muted);
  margin-top:8px; font-style:italic;
}

/* ── RIGHT: Mind Map Canvas ── */
#map-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
}
#map-area.grabbing { cursor: grabbing; }

/* grid bg */
#map-area::before {
  content:''; position:absolute; inset:0; z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:54px 54px;
}

svg#svg-layer {
  position:absolute; inset:0;
  width:100%; height:100%;
  pointer-events:none; z-index:1;
}

#map {
  position:absolute; top:50%; left:50%;
  transform-origin:center center;
  transform:translate(-50%,-50%);
  z-index:2;
}

/* ── Map nodes ── */
.node {
  position:absolute; transform:translate(-50%,-50%);
  border-radius:50%; display:flex; align-items:center;
  justify-content:center; text-align:center; cursor:pointer;
  transition:transform .2s ease, box-shadow .2s ease;
  user-select:none; z-index:3;
}
.node:hover { transform:translate(-50%,-50%) scale(1.12); }
.node:active{ transform:translate(-50%,-50%) scale(.97); }

.node-center {
  width:130px; height:130px; z-index:10;
  background:radial-gradient(circle at 36% 30%,#f5e8c0,#a07820);
  box-shadow:0 0 0 2px rgba(201,168,76,.3),0 0 38px rgba(201,168,76,.5),0 0 80px rgba(201,168,76,.15);
  font-family:'Cormorant Garamond',serif;
  font-size:14px; font-weight:700; color:#1a1208; line-height:1.3; padding:13px;
  animation:halo 4s ease-in-out infinite;
}
@keyframes halo{
  0%,100%{box-shadow:0 0 0 2px rgba(201,168,76,.3),0 0 38px rgba(201,168,76,.5),0 0 80px rgba(201,168,76,.15);}
  50%     {box-shadow:0 0 0 3px rgba(201,168,76,.45),0 0 55px rgba(201,168,76,.7),0 0 110px rgba(201,168,76,.25);}
}

.node-branch {
  width:92px; height:92px;
  font-family:'Cormorant Garamond',serif;
  font-size:10px; font-weight:700; color:#fff; line-height:1.35; padding:10px;
  opacity:0; animation:popIn .5s ease forwards;
}
@keyframes popIn{
  from{opacity:0;transform:translate(-50%,-50%) scale(.4)}
  to  {opacity:1;transform:translate(-50%,-50%) scale(1)}
}

.node-leaf {
  width:74px; height:74px; font-size:8.5px; font-weight:400;
  color:rgba(255,255,255,.88); line-height:1.35; padding:9px;
  opacity:0; pointer-events:none;
  transition:opacity .32s ease;
}
.node-leaf.visible{opacity:1;pointer-events:auto;}

.b1{background:radial-gradient(circle at 35% 30%,#f4a07a,#e07b54);box-shadow:0 0 20px rgba(224,123,84,.5);}
.b2{background:radial-gradient(circle at 35% 30%,#7ed4c8,#4db8a8);box-shadow:0 0 20px rgba(77,184,168,.5);}
.b3{background:radial-gradient(circle at 35% 30%,#b99fe0,#9b7fd4);box-shadow:0 0 20px rgba(155,127,212,.5);}
.b4{background:radial-gradient(circle at 35% 30%,#f0ce6e,#e8b84b);box-shadow:0 0 20px rgba(232,184,75,.5);}
.b5{background:radial-gradient(circle at 35% 30%,#8dce9e,#6ab187);box-shadow:0 0 20px rgba(106,177,135,.5);}
.b6{background:radial-gradient(circle at 35% 30%,#e08fa5,#d46b8a);box-shadow:0 0 20px rgba(212,107,138,.5);}
.l1{background:rgba(224,123,84,.18);border:1.5px solid rgba(224,123,84,.5);}
.l2{background:rgba(77,184,168,.18);border:1.5px solid rgba(77,184,168,.5);}
.l3{background:rgba(155,127,212,.18);border:1.5px solid rgba(155,127,212,.5);}
.l4{background:rgba(232,184,75,.18);border:1.5px solid rgba(232,184,75,.5);}
.l5{background:rgba(106,177,135,.18);border:1.5px solid rgba(106,177,135,.5);}
.l6{background:rgba(212,107,138,.18);border:1.5px solid rgba(212,107,138,.5);}

/* ── Detail panel (right side) ── */
#panel-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(5,6,10,.65);backdrop-filter:blur(5px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#panel-overlay.open{opacity:1;pointer-events:auto;}

#panel{
  position:fixed;top:0;right:0;bottom:0;
  width:min(500px,100vw);
  background:var(--surface);
  border-left:1px solid var(--border);
  transform:translateX(100%);
  transition:transform .36s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;z-index:101;overflow:hidden;
}
#panel.open{transform:translateX(0);}

#panel-header{padding:26px 26px 18px;border-bottom:1px solid var(--border);position:relative;flex-shrink:0;}
#panel-accent{position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold);transition:background .3s;}
#panel-icon{font-size:30px;line-height:1;margin-bottom:8px;}
#panel-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--gold-l);line-height:1.2;}
#panel-sub{font-size:9.5px;color:var(--muted);margin-top:4px;letter-spacing:.12em;text-transform:uppercase;}
#panel-close{
  position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  color:var(--muted);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s;
}
#panel-close:hover{background:rgba(255,255,255,.14);color:#fff;}

#panel-tabs{display:flex;gap:2px;padding:10px 26px 0;flex-shrink:0;}
.ptab{
  font-size:9.5px;padding:5px 13px;border-radius:6px 6px 0 0;
  background:rgba(255,255,255,.04);border:1px solid var(--border);border-bottom:none;
  color:var(--muted);cursor:pointer;letter-spacing:.06em;text-transform:uppercase;
  transition:background .18s,color .18s;
}
.ptab.active{background:rgba(255,255,255,.09);color:var(--gold);}

#panel-body{flex:1;overflow-y:auto;padding:22px 26px 30px;}
#panel-body::-webkit-scrollbar{width:3px;}
#panel-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}

.ps h3{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--gold);
  margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border);letter-spacing:.04em;}
.ps{margin-bottom:24px;}
.ps p{font-size:11.5px;line-height:1.8;color:var(--text);margin-bottom:7px;}
.ps ul{list-style:none;}
.ps ul li{font-size:11px;line-height:1.75;color:var(--text);
  padding:4px 0 4px 16px;border-bottom:1px solid rgba(255,255,255,.04);position:relative;}
.ps ul li::before{content:'›';position:absolute;left:0;color:var(--gold);font-size:13px;}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.pill{font-size:10px;padding:3px 11px;border-radius:18px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);color:var(--text);}
.fbox{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:7px;
  padding:11px 14px;font-size:12.5px;font-family:'Cormorant Garamond',serif;
  color:var(--gold-l);margin:9px 0;text-align:center;letter-spacing:.04em;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:8px;}
.fcard{background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:7px;padding:11px;text-align:center;}
.fcard .fv{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold-l);}
.fcard .fl{font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:.07em;text-transform:uppercase;}

/* ── UI chrome ── */
#ui-bar{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none;z-index:5;
}
#ui-bar h1{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;
  color:rgba(201,168,76,.65);letter-spacing:.22em;text-transform:uppercase;}
#ui-bar p{font-size:8.5px;color:rgba(255,255,255,.22);letter-spacing:.13em;margin-top:2px;}

#zoom-btns{position:absolute;bottom:20px;right:20px;display:flex;flex-direction:column;gap:5px;z-index:5;}
#zoom-btns button{
  width:32px;height:32px;border-radius:7px;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:rgba(255,255,255,.55);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .18s;
}
#zoom-btns button:hover{background:rgba(255,255,255,.13);color:#fff;}

#hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:9px;color:rgba(255,255,255,.18);letter-spacing:.1em;pointer-events:none;z-index:5;}
</style>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════════════
       LEFT — PERIODIC TABLE
  ══════════════════════════════════════════════ -->
  <div id="pt-panel">
    <div id="pt-header">
      <h2>⚛ Tabela Periódica</h2>
      <p>118 ELEMENTOS · PASSE O MOUSE PARA DETALHES</p>
    </div>
    <div id="pt-legend"></div>
    <div id="pt-grid-wrap">
      <div id="pt-grid"></div>
    </div>
  </div>

  <!-- Element tooltip -->
  <div id="el-tooltip"></div>

  <!-- ══════════════════════════════════════════════
       RIGHT — MIND MAP
  ══════════════════════════════════════════════ -->
  <div id="map-area">
    <div id="ui-bar">
      <h1>⚗ Química — Mapa Mental</h1>
      <p>Clique nos ramos · Arraste · Scroll para zoom</p>
    </div>
    <svg id="svg-layer"></svg>
    <div id="map"></div>
    <div id="zoom-btns">
      <button id="zin">+</button>
      <button id="zout">−</button>
    </div>
    <div id="hint">Arraste para navegar · Scroll para zoom · Clique nos nós para detalhes</div>
  </div>

  <!-- Detail panel -->
  <div id="panel-overlay"></div>
  <div id="panel">
    <div id="panel-accent"></div>
    <div id="panel-header">
      <button id="panel-close">✕</button>
      <div id="panel-icon">⚗️</div>
      <div id="panel-title">Título</div>
      <div id="panel-sub">subtítulo</div>
    </div>
    <div id="panel-tabs"></div>
    <div id="panel-body"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   PERIODIC TABLE DATA  (118 elements)
═══════════════════════════════════════════════════════════ */

  for (let c = 1; c <= 18; c++) {
    const key = `${r}-${c}`;
    const el  = cellMap[key];

    if (el) {
      const div = document.createElement('div');
      div.className = `el cat-${el[4]}`;
      div.innerHTML = `<div class="el-z">${el[0]}</div><div class="el-sym">${el[1]}</div><div class="el-m">${parseFloat(el[3]).toFixed(0)}</div>`;
      div.style.gridRow    = r;
      div.style.gridColumn = c;
      div.addEventListener('mouseenter', ev => showElTooltip(ev, el));
      div.addEventListener('mousemove',  ev => moveTooltip(ev));
      div.addEventListener('mouseleave', hideElTooltip);
      grid.appendChild(div);
    } else if (r === 6 && c === 3) {
      // La gap
      const gap = document.createElement('div');
      gap.className = 'la-gap';

// ─── Tooltip logic ─────────────────────────────────────────────────────────────
const tt  = document.getElementById('el-tooltip');

function showElTooltip(ev, el) {
  const [z,sym,name,mass,cat,grp,per,cfg,desc] = el;
  tt.innerHTML = `
    <div class="tt-sym" style="color:${LEG_COLORS[cat]}">${sym}</div>
    <div class="tt-name">${name}</div>
    <div class="tt-cat">${CAT_NAMES[cat]} · Grupo ${grp} · Período ${per}</div>
    <hr>
    <table>
      <tr><td>Número Atômico</td><td><b>${z}</b></td></tr>
      <tr><td>Massa Atômica</td><td><b>${mass} u</b></td></tr>
      <tr><td>Configuração</td><td><b>${cfg}</b></td></tr>
    </table>
    <div class="tt-desc">${desc}</div>
  `;
  moveTooltip(ev);
  tt.classList.add('show');
}
function moveTooltip(ev) {
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = ev.clientX + 16, y = ev.clientY + 16;
  // keep inside viewport
  if (x + 250 > vw) x = ev.clientX - 260;
  if (y + 260 > vh) y = ev.clientY - 270;
  // don't overlap pt panel — use live map-area left edge
  const maLeft = maEl.getBoundingClientRect().left;
  if (x < maLeft + 4) x = maLeft + 8;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}
function hideElTooltip() { tt.classList.remove('show'); }

    <div class="ps"><h3>Não-Metais</h3><ul><li>Maus condutores</li><li>Frágeis quando sólidos</li><li>Formam compostos da vida (C,N,O,P,S)</li><li>Tendem a ganhar e⁻ (ânions)</li></ul></div>
    <div class="ps"><h3>Semimetais</h3><p>Si, Ge — semicondutores. Base da eletrônica moderna.</p></div>`}]},
  b3_l2:{icon:'🅰️',title:'Elementos Representativos',sub:'Grupos A — Blocos s e p',color:'var(--c3)',tabs:[{label:'Grupos A',content:`
    <div class="ps"><h3>Grupos Principais</h3><ul>
      <li><b>1A</b>: H, Li, Na, K — 1 e⁻</li><li><b>2A</b>: Be, Mg, Ca — 2 e⁻</li>
      <li><b>4A</b>: C, Si — base da vida e da eletrônica</li>
      <li><b>6A</b>: O, S — 6 e⁻</li><li><b>7A</b>: F, Cl, Br, I — halogênios</li>
      <li><b>8A</b>: He, Ne, Ar — gases nobres (inertes)</li>
    </ul></div>`}]},

  b4_l0:{icon:'⊕⊖',title:'Ligação Iônica',sub:'Cristais iônicos · Transferência de e⁻',color:'var(--c4)',tabs:[{label:'Detalhes',content:`
    <div class="ps"><h3>Formação</h3><p>ΔEN ≥ 1,7 favorece ligação iônica. Metal cede e⁻ ao não-metal.</p></div>
    <div class="ps"><h3>Rede Cristalina</h3><p>Íons opostos alternados em estrutura 3D. NaCl: cada Na⁺ rodeado por 6 Cl⁻ (cúbico).</p></div>
    <div class="ps"><h3>Propriedades</h3><ul><li>NaCl: pf = 801°C</li><li>MgO: pf = 2852°C</li><li>Quebradiços — planos cristalinos repelem ao deslizar</li></ul></div>`}]},
  b4_l1:{icon:'↔',title:'Ligação Covalente',sub:'Compartilhamento · Moléculas',color:'var(--c4)',tabs:[{label:'Tipos',content:`
    <div class="ps"><h3>Estrutura de Lewis</h3><ul><li>H—H (simples)</li><li>O═O (dupla)</li><li>N≡N (tripla)</li></ul></div>
    <div class="ps"><h3>Forças Intermoleculares</h3><ul>
      <li><b>Ligação de H</b>: H ligado a N,O,F — muito forte. Explica propriedades da água.</li>
      <li><b>Dipolo-dipolo</b>: entre moléculas polares</li>
      <li><b>London</b>: todas moléculas; cresce com massa molar</li>
    </ul></div>`}]},
  b4_l2:{icon:'⚡',title:'Ligação Metálica',sub:'Mar de elétrons · Ligas',color:'var(--c4)',tabs:[{label:'Detalhes',content:`
    <div class="ps"><h3>Modelo</h3><p>E⁻ de valência desligam-se dos átomos e ficam deslocalizados por toda a rede. Campo eletrostático mantém os cátions metálicos.</p></div>
    <div class="ps"><h3>Ligas Metálicas</h3><div class="pill-row"><span class="pill">Bronze (Cu+Sn)</span><span class="pill">Latão (Cu+Zn)</span><span class="pill">Aço (Fe+C)</span><span class="pill">Solda (Sn+Pb)</span></div></div>`}]},

  b5_l0:{icon:'➕',title:'Síntese e Análise',sub:'Combinação e Decomposição',color:'var(--c5)',tabs:[{label:'Detalhes',content:`
    <div class="ps"><h3>Síntese</h3><ul><li>N₂ + 3H₂ → 2NH₃ (Processo Haber)</li><li>2H₂ + O₂ → 2H₂O</li><li>CaO + H₂O → Ca(OH)₂</li></ul></div>
    <div class="ps"><h3>Análise</h3><ul><li>2H₂O → 2H₂ + O₂ (eletrólise)</li><li>CaCO₃ → CaO + CO₂ (calcário aquecido)</li><li>2H₂O₂ → 2H₂O + O₂</li></ul></div>`}]},
  b5_l1:{icon:'⚡',title:'Oxirredução',sub:'NOx · Transferência de elétrons',color:'var(--c5)',tabs:[{label:'NOx',content:`
    <div class="ps"><h3>Número de Oxidação</h3><p>Carga formal se todos e⁻ pertencessem ao mais eletronegativo. Regras: elemento puro = 0; O = −2; H = +1.</p></div>
    <div class="ps"><h3>Aplicações</h3><ul><li><b>Pilha de Daniell</b>: Zn se oxida, Cu²⁺ se reduz</li><li><b>Eletrólise</b>: corrente força ox-red (galvanoplastia)</li><li><b>Corrosão</b>: Fe → Fe²⁺ + 2e⁻</li></ul></div>`}]},
  b5_l2:{icon:'⇌',title:'Equilíbrio Químico',sub:'Kc · Le Chatelier · Kp',color:'var(--c5)',tabs:[{label:'Constantes',content:`
    <div class="ps"><h3>Kc</h3><p>Kc>>1: favorece produtos. Kc<<1: favorece reagentes.</p>
    <div class="fbox">N₂ + 3H₂ ⇌ 2NH₃<br>Kc = [NH₃]² / ([N₂][H₂]³)</div></div>
    <div class="ps"><h3>Fatores que Alteram</h3><ul>
      <li>Concentração — Kc não muda</li><li>Temperatura — Kc muda</li>
      <li>Pressão/volume — apenas Kp; Kc não muda</li><li>Catalisador — acelera ambas as direções</li>
    </ul></div>`}]},

  b6_l0:{icon:'🔢',title:'Mol e Molaridade',sub:'Avogadro · Cálculos',color:'var(--c6)',tabs:[{label:'Cálculos',content:`
    <div class="ps"><h3>Relações</h3><ul><li>n = m / M</li><li>n = N / Nₐ</li><li>n = V / 22,4 (CNTP)</li></ul></div>
    <div class="ps"><h3>Exemplo</h3><p>90 g de H₂O: M=18 g/mol → n = 90/18 = <b style="color:var(--gold)">5 mols</b></p><p>N = 5 × 6,022×10²³ = <b style="color:var(--gold)">3,01×10²⁴ moléculas</b></p></div>`}]},
  b6_l1:{icon:'⚗',title:'pH e Ácido-Base',sub:'Indicadores · Tampões',color:'var(--c6)',tabs:[{label:'pH',content:`
    <div class="ps"><h3>Indicadores</h3><ul><li>Tornassol: vermelho(ácido)/azul(base)</li><li>Fenolftaleína: incolor(ácido)/rosa(base >8,2)</li><li>Azul de bromotimol: amarelo/azul</li></ul></div>
    <div class="ps"><h3>Tampão</h3><p>Resistem a variações de pH. Ácido fraco + base conjugada. pH do sangue: 7,35–7,45.</p></div>
    <div class="fbox">pH sanguíneo normal: 7,35 – 7,45</div>`}]},
  b6_l2:{icon:'💦',title:'Diluição',sub:'C₁V₁ = C₂V₂ · Solubilidade',color:'var(--c6)',tabs:[{label:'Diluição',content:`
    <div class="ps"><h3>Lei da Diluição</h3><div class="fbox">C₁V₁ = C₂V₂</div><p>Moles de soluto se conservam. Ex: 100mL de 2M → 400mL: C₂ = 0,5M</p></div>
    <div class="ps"><h3>Solubilidade</h3><ul><li>↑T → ↑solubilidade de sólidos</li><li>↑T → ↓solubilidade de gases</li><li>↑P → ↑solubilidade de gases (Lei de Henry)</li><li>"Semelhante dissolve semelhante"</li></ul></div>
    <div class="fbox">Lei de Henry: S = k·P</div>`}]},
};

const ALL_DATA = {...PANEL_DATA, ...LEAF_DATA};

/* ═══════════════════════════════════════════════════════════
   MIND MAP BUILD
═══════════════════════════════════════════════════════════ */
const BRANCHES = [
  {id:'b1',angle:0,   dist:200,cls:'b1',lcls:'l1',label:'Matéria &\nSubstâncias'},
  {id:'b2',angle:60,  dist:200,cls:'b2',lcls:'l2',label:'Átomo &\nEstrutura'},
  {id:'b3',angle:120, dist:200,cls:'b3',lcls:'l3',label:'Tabela\nPeriódica'},
  {id:'b4',angle:180, dist:200,cls:'b4',lcls:'l4',label:'Ligações\nQuímicas'},
  {id:'b5',angle:240, dist:200,cls:'b5',lcls:'l5',label:'Reações\nQuímicas'},
  {id:'b6',angle:300, dist:200,cls:'b6',lcls:'l6',label:'Soluções &\nConcentração'},
];
const LEAF_LABELS = [
  ['Estados\nda Matéria','Misturas','Substância\nPura'],
  ['Prótons\ne Nêutrons','Elétrons','Número\nAtômico'],
  ['Períodos\ne Grupos','Metais e\nNão-Metais','Elementos\nRepresentativos'],
  ['Lig.\nIônica','Lig.\nCovalente','Lig.\nMetálica'],
  ['Síntese &\nAnálise','Oxidação-\nRedução','Equilíbrio\nQuímico'],
  ['Mol e\nMolaridade','pH e\nÁcido-Base','Diluição'],
];
const BCOLORS=['#e07b54','#4db8a8','#9b7fd4','#e8b84b','#6ab187','#d46b8a'];
const r2d = d => d*Math.PI/180;

const mapEl  = document.getElementById('map');
const svgEl  = document.getElementById('svg-layer');
const maEl   = document.getElementById('map-area');

// center node
const ctrEl = document.createElement('div');
ctrEl.className='node node-center';
ctrEl.style.cssText='left:0;top:0;';
ctrEl.innerHTML='⚗️<br><span style="font-size:15px;font-weight:900">QUÍMICA</span><br><span style="font-size:8px;font-weight:300;opacity:.65">Introdução</span>';
ctrEl.addEventListener('click',e=>{e.stopPropagation();openPanel('center');});
mapEl.appendChild(ctrEl);

BRANCHES.forEach((b,bi)=>{
  const rad=r2d(b.angle), bx=Math.cos(rad)*b.dist, by=Math.sin(rad)*b.dist;
  const bEl=document.createElement('div');
  bEl.className=`node node-branch ${b.cls}`;
  bEl.id=b.id;
  bEl.style.cssText=`left:${bx}px;top:${by}px;animation-delay:${bi*.1+.15}s`;
  bEl.innerHTML=b.label.replace('\n','<br>');
  mapEl.appendChild(bEl);

  let open=false;
  const leafEls=[];
  LEAF_LABELS[bi].forEach((lbl,li)=>{
    const la=rad+(li-1)*.44, ld=172;
    const lx=bx+Math.cos(la)*ld, ly=by+Math.sin(la)*ld;
    const lid=LEAF_IDS[bi][li];
    const lEl=document.createElement('div');
    lEl.className=`node node-leaf ${b.lcls}`;
    lEl.id=lid;
    lEl.style.cssText=`left:${lx}px;top:${ly}px;`;
    lEl.innerHTML=lbl.replace('\n','<br>');
    lEl.addEventListener('click',e=>{e.stopPropagation();openPanel(lid);});
    mapEl.appendChild(lEl);
    leafEls.push(lEl);
  });
  bEl.addEventListener('click',e=>{
    e.stopPropagation(); open=!open;
    leafEls.forEach(l=>l.classList.toggle('visible',open));
    drawLines(); openPanel(b.id);
  });
});

// draw lines
function nodeCtr(el){const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
function drawLines(){
  svgEl.innerHTML='';
  const ar = maEl.getBoundingClientRect(); // map-area offset
  BRANCHES.forEach((b,bi)=>{
    const bEl=document.getElementById(b.id); if(!bEl)return;
    const c=nodeCtr(ctrEl),bc=nodeCtr(bEl);
    addLine(c.x-ar.left,c.y-ar.top,bc.x-ar.left,bc.y-ar.top,BCOLORS[bi],2,.55,false);
    LEAF_IDS[bi].forEach((lid)=>{
      const lEl=document.getElementById(lid);
      if(!lEl||!lEl.classList.contains('visible'))return;
      const lc=nodeCtr(lEl); addLine(bc.x-ar.left,bc.y-ar.top,lc.x-ar.left,lc.y-ar.top,BCOLORS[bi],1.5,.38,true);
    });
  });
}
function addLine(x1,y1,x2,y2,c,w,op,dash){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',c);l.setAttribute('stroke-width',w);l.setAttribute('stroke-opacity',op);
  if(dash)l.setAttribute('stroke-dasharray','5,4');
  svgEl.appendChild(l);
}

/* ═══════════════════════════════════════════════════════════
   DETAIL PANEL
═══════════════════════════════════════════════════════════ */
const ov=document.getElementById('panel-overlay');
const pan=document.getElementById('panel');
const pCl=document.getElementById('panel-close');
const pIc=document.getElementById('panel-icon');
const pTi=document.getElementById('panel-title');
const pSu=document.getElementById('panel-sub');
const pTb=document.getElementById('panel-tabs');
const pBo=document.getElementById('panel-body');
const pAc=document.getElementById('panel-accent');

function openPanel(id){
  const d=ALL_DATA[id]; if(!d)return;
  pIc.textContent=d.icon; pTi.textContent=d.title; pSu.textContent=d.sub;
  pAc.style.background=d.color||'var(--gold)';
  pTb.innerHTML='';
  d.tabs.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='ptab'+(i===0?' active':'');
    btn.textContent=t.label;
    btn.onclick=()=>{
      pTb.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); pBo.innerHTML=t.content;
    };
    pTb.appendChild(btn);
  });
  pBo.innerHTML=d.tabs[0].content;
  ov.classList.add('open'); pan.classList.add('open');
}
function closePanel(){ov.classList.remove('open');pan.classList.remove('open');}
pCl.addEventListener('click',closePanel);
ov.addEventListener('click',closePanel);

/* ═══════════════════════════════════════════════════════════
   PAN & ZOOM (map-area only)
═══════════════════════════════════════════════════════════ */
let scale=1,tx=0,ty=0,isDrag=false,sx,sy;
function applyTx(){
  mapEl.style.transform=`translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(${scale})`;
  requestAnimationFrame(drawLines);
}
maEl.addEventListener('mousedown',e=>{
  if(e.target.closest('#panel,#panel-overlay,#el-tooltip'))return;
  isDrag=true; sx=e.clientX-tx; sy=e.clientY-ty; maEl.classList.add('grabbing');
});
window.addEventListener('mousemove',e=>{if(!isDrag)return; tx=e.clientX-sx; ty=e.clientY-sy; applyTx();});
window.addEventListener('mouseup',()=>{isDrag=false; maEl.classList.remove('grabbing');});
maEl.addEventListener('wheel',e=>{
  e.preventDefault();
  scale=Math.min(2.2,Math.max(.3,scale-e.deltaY*.001));
  applyTx();
},{passive:false});
document.getElementById('zin').onclick=()=>{scale=Math.min(2.2,scale+.15);applyTx();};
document.getElementById('zout').onclick=()=>{scale=Math.max(.3,scale-.15);applyTx();};

// touch
maEl.addEventListener('touchstart',e=>{if(e.touches.length===1){isDrag=true;sx=e.touches[0].clientX-tx;sy=e.touches[0].clientY-ty;}});
maEl.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&isDrag){tx=e.touches[0].clientX-sx;ty=e.touches[0].clientY-sy;applyTx();}},{passive:false});
maEl.addEventListener('touchend',()=>isDrag=false);

// init
requestAnimationFrame(()=>requestAnimationFrame(drawLines));
window.addEventListener('resize',drawLines);
</script>
</body>
</html>
